name: CI for releases

on:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  quality-gate:
    name: Release quality gate
    uses: ./.github/workflows/install-test-build.yml

  browser-e2e:
    name: Browser e2e suite
    needs: [quality-gate]
    uses: ./.github/workflows/full-env-e2e.yml

  container-e2e:
    name: Container e2e suite
    needs: [quality-gate]
    uses: ./.github/workflows/minimal-env-e2e.yml

  publish-images:
    name: Publish container images
    needs: [quality-gate, browser-e2e, container-e2e]
    permissions:
      actions: write
      contents: read
    uses: ./.github/workflows/build-and-push.yml
    secrets:
      PAT: ${{ secrets.PAT }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
