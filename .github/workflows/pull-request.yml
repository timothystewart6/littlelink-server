name: 'Pull Request'
on:
  pull_request:
    branches:
      - master
    paths-ignore:
      - .gitignore
      - README.md
      - LICENSE

jobs:
  install-test-build:
    uses: ./.github/workflows/install-test-build.yml
    with:
      build-docker: true

  full-env-e2e:
    needs: [install-test-build]
    uses: ./.github/workflows/full-env-e2e.yml

