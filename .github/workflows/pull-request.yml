name: 'Pull Request'
on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - .gitignore
      - README.md
      - LICENSE

permissions:
  contents: read

jobs:
  quality-gate:
    name: Node quality gate
    uses: ./.github/workflows/install-test-build.yml
    with:
      build-docker: true

  browser-e2e:
    name: Browser e2e suite
    needs: [quality-gate]
    uses: ./.github/workflows/full-env-e2e.yml
